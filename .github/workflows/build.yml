name: Build Mod

on:
  push:
    branches: [main, master]
    paths:
      - 'music/**'
      - 'src/**'
      - 'build.gradle'
      - 'gradle.properties'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate mod sources from music/ folder
        run: python3 scripts/generate_mod.py

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build client JAR (with music)
        run: ./gradlew jar

      - name: Build server JAR (without music)
        run: ./gradlew serverJar

      - name: Commit and push build output
        run: |
          mkdir -p build/output
          rm -f build/output/*.jar
          cp build/libs/SIM-RecordPlayer-1.0.0.jar build/output/
          cp build/libs/SIM-RecordPlayer-1.0.0-server.jar build/output/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f build/output/
          git commit -m "Build: update JARs (client + server) [skip ci]" || true
          git push origin main
